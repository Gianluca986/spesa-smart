<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesa Smart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { color: #2c3e50; }
        textarea {
            width: 100%;
            max-width: 400px;
            height: 150px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        button:active { background-color: #2ecc71; }
        #risultato {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .corsia-titolo {
            font-weight: bold;
            color: #2980b9;
            margin-top: 15px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
        }
        .prodotto-container {
            display: flex;
            align-items: center;
            margin: 10px 0 10px 10px;
        }
        .prodotto-container input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            accent-color: #27ae60;
            cursor: pointer;
        }
        .prodotto-container label {
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s, text-decoration 0.2s;
        }
        .prodotto-container input[type="checkbox"]:checked + label {
            text-decoration: line-through;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <h2>Lista della Spesa</h2>
    
    <textarea id="inputSpesa" placeholder="Incolla qui la lista di WhatsApp..."></textarea>
    <button onclick="ordinaSpesa()">Ordina per Percorso</button>

    <div id="risultato"></div>

    <script>
        // ==========================================
        // AREA DI CONFIGURAZIONE
        // ==========================================

        const mappaSupermercato = {
            "ortofrutta": 1,
            "banco gastronomia": 2,
            "banco freschi": 3,
            "banco macelleria": 4,
            "banco panetteria": 5,
            "corsia 01 (Colazione, Pane)": 6,
            "corsia 02 (Biscotti, Cartoleria)": 7,
            "corsia 03 (Farina, Piatti)": 8,
            "corsia 04 (Pasta, Riso)": 9,
            "corsia 05 (Olio, Conserve)": 10,
            "corsia 06 (Cura Corpo, Infanzia)": 11,
            "corsia 07 (Igiene Orale, Deodoranti)": 12,
            "corsia 08 (Carta Igienica)": 13,
            "corsia 09 (Bucato)": 14,
            "corsia 10 (Pulizia Casa)": 15,
            "corsia 11 (Animali, Brico)": 16,
            "corsia 12 (Snack, Succhi)": 17,
            "corsia 13 (Carta Casa, Alluminio)": 18,
            "corsia 14 (Surgelati, Bibite)": 19,
            "sconosciuto": 99
        };

        const catalogoProdotti = {
            "mele": "ortofrutta", "insalata": "ortofrutta", "pomodori": "ortofrutta",
            "fragole": "ortofrutta", "melone": "ortofrutta", "anguria": "ortofrutta",
            "uva": "ortofrutta", "pesche": "ortofrutta", "kiwi": "ortofrutta", "banane": "ortofrutta",
            "ananas": "ortofrutta", "zucchine": "ortofrutta", "carote": "ortofrutta", "patate": "ortofrutta",
            "cetrioli": "ortofrutta", "finocchi": "ortofrutta", "cipolla": "ortofrutta",

            "pane": "corsia 01 (Colazione, Pane)", "toast": "corsia 01 (Colazione, Pane)", "grissini": "corsia 01 (Colazione, Pane)", "crostini": "corsia 01 (Colazione, Pane)", "grattuggiato": "corsia 01 (Colazione, Pane)", "panini": "corsia 01 (Colazione, Pane)", "caffe": "corsia 01 (Colazione, Pane)", "marmellata": "corsia 01 (Colazione, Pane)", "zucchero": "corsia 01 (Colazione, Pane)",

            "galbusera": "corsia 02 (Biscotti, Cartoleria)", "torta": "corsia 02 (Biscotti, Cartoleria)", "biscotti": "corsia 02 (Biscotti, Cartoleria)", "gocciole": "corsia 02 (Biscotti, Cartoleria)", "barrette": "corsia 02 (Biscotti, Cartoleria)",

            "farina": "corsia 03 (Farina, Piatti)", "lievito": "corsia 03 (Farina, Piatti)",

            "pasta": "corsia 04 (Pasta, Riso)", "tagliatelle": "corsia 04 (Pasta, Riso)", "riso": "corsia 04 (Pasta, Riso)", "penne": "corsia 04 (Pasta, Riso)",

            "ketchup": "corsia 05 (Olio, Conserve)", "olio": "corsia 05 (Olio, Conserve)", "sugo": "corsia 05 (Olio, Conserve)", "olio di girasole": "corsia 05 (Olio, Conserve)", "sale": "corsia 05 (Olio, Conserve)", "tonno": "corsia 05 (Olio, Conserve)", "piselli": "corsia 05 (Olio, Conserve)", "ceci": "corsia 05 (Olio, Conserve)",

            "bagno schiuma": "corsia 06 (Cura Corpo, Infanzia)", "creme": "corsia 06 (Cura Corpo, Infanzia)", "profumo": "corsia 06 (Cura Corpo, Infanzia)",

            "dentifricio": "corsia 07 (Igiene Orale, Deodoranti)",

            "carta": "corsia 08 (Carta Igienica)", "fazzoletti": "corsia 08 (Carta Igienica)", "assorbenti": "corsia 08 (Carta Igienica)",

            "detersivo": "corsia 09 (Bucato)",

            "pastiglia": "corsia 10 (Pulizia Casa)", "guanti": "corsia 10 (Pulizia Casa)", "sale lavastoviglie": "corsia 10 (Pulizia Casa)", "detertisivo piatti": "corsia 10 (Pulizia Casa)", "sgrassatore": "corsia 10 (Pulizia Casa)", "lavapavimenti": "corsia 10 (Pulizia Casa)", "spugne": "corsia 10 (Pulizia Casa)", "wcnet": "corsia 10 (Pulizia Casa)",

            "patatine": "corsia 12 (Snack, Succhi)", "bretzel": "corsia 12 (Snack, Succhi)", "cross": "corsia 12 (Snack, Succhi)", "semi di girasole": "corsia 12 (Snack, Succhi)", "arachidi": "corsia 12 (Snack, Succhi)", "pera": "corsia 12 (Snack, Succhi)",

            "alluminio": "corsia 13 (Carta Casa, Alluminio)", "sacchi": "corsia 13 (Carta Casa, Alluminio)", "scottex": "corsia 13 (Carta Casa, Alluminio)",

            "ghiaccioli": "corsia 14 (Surgelati, Bibite)", "cuccioloni": "corsia 14 (Surgelati, Bibite)", "fragolino": "corsia 14 (Surgelati, Bibite)", "soffritto": "corsia 14 (Surgelati, Bibite)", "viennetta": "corsia 14 (Surgelati, Bibite)", "aglio": "corsia 14 (Surgelati, Bibite)", "cipolla tritata": "corsia 14 (Surgelati, Bibite)", "fagiolini": "corsia 14 (Surgelati, Bibite)", "patatine surgelate": "corsia 14 (Surgelati, Bibite)", "pizze": "corsia 14 (Surgelati, Bibite)", "farinata": "corsia 14 (Surgelati, Bibite)", "vaschette": "corsia 14 (Surgelati, Bibite)", "tiramisu": "corsia 14 (Surgelati, Bibite)", "the": "corsia 14 (Surgelati, Bibite)", "coca cola": "corsia 14 (Surgelati, Bibite)",

            "focaccia": "banco panetteria",

            "olive": "banco gastronomia", "prosciutto": "banco gastronomia", "mortadella": "banco gastronomia", "speck": "banco gastronomia", "pollo": "banco gastronomia",

            "latte": "banco freschi", "mozzarelle": "banco freschi", "sottilette": "banco freschi", "pesto": "banco freschi", "tortellini": "banco freschi", "trofie": "banco freschi", "parmiggiano": "banco freschi", "salame": "banco freschi", "burro": "banco freschi",

            "uova": "banco macelleria", "petto": "banco macelleria", "trita": "banco macelleria", "hamburger": "banco macelleria", "salsiccia": "banco macelleria"
        };

        // ==========================================
        // LOGICA DELL'ALGORITMO
        // ==========================================

        function ordinaSpesa() {
            const testoInput = document.getElementById('inputSpesa').value;
            if (!testoInput.trim()) return;

            const righe = testoInput.split('\n').map(r => r.trim().toLowerCase()).filter(r => r.length > 0);

            let listaDaOrdinare = righe.map(nomeProdotto => {
                let categoriaAssegnata = "sconosciuto";
                
                for (const [prodottoCatalogo, categoria] of Object.entries(catalogoProdotti)) {
                    if (nomeProdotto.includes(prodottoCatalogo)) {
                        categoriaAssegnata = categoria;
                        break;
                    }
                }

                return {
                    nomeOriginale: nomeProdotto,
                    categoria: categoriaAssegnata,
                    ordineCorsia: mappaSupermercato[categoriaAssegnata] || 99
                };
            });

            listaDaOrdinare.sort((a, b) => a.ordineCorsia - b.ordineCorsia);
            mostraRisultato(listaDaOrdinare);
        }

        function mostraRisultato(lista) {
            const divRisultato = document.getElementById('risultato');
            divRisultato.innerHTML = ''; 

            let corsiaAttuale = "";
            let contatoreID = 0; 

            lista.forEach(item => {
                if (item.categoria !== corsiaAttuale) {
                    const titolo = document.createElement('div');
                    titolo.className = 'corsia-titolo';
                    titolo.innerText = item.categoria.toUpperCase() + (item.ordineCorsia === 99 ? " (Da cercare)" : "");
                    divRisultato.appendChild(titolo);
                    corsiaAttuale = item.categoria;
                }

                contatoreID++;
                
                const container = document.createElement('div');
                container.className = 'prodotto-container';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = 'prodotto-' + contatoreID;

                const label = document.createElement('label');
                label.htmlFor = 'prodotto-' + contatoreID;
                label.innerText = item.nomeOriginale.charAt(0).toUpperCase() + item.nomeOriginale.slice(1);

                container.appendChild(checkbox);
                container.appendChild(label);
                divRisultato.appendChild(container);
            });
        }
    </script>
</body>
</html>
